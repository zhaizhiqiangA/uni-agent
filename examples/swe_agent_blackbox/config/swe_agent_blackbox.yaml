# PPO trainer config for the blackbox SWE-agent recipe (v2).
# Uses the generic AgentFrameworkRolloutAdapter + SWEAgentFramework subclass.

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

actor_rollout_ref:
  hybrid_engine: true
  nccl_timeout: 600

  model:
    path: ???

  rollout:
    name: vllm
    mode: async
    prompt_length: 4096
    response_length: 2048
    max_model_len: 6144
    temperature: 1.0
    top_p: 1.0
    n: 1
    tensor_model_parallel_size: 4
    gpu_memory_utilization: 0.5
    calculate_log_probs: true
    enable_sleep_mode: false
    free_cache_engine: false

    multi_turn:
      enable: true
      max_assistant_turns: 2
      max_parallel_calls: 1

    agent:
      num_workers: 8
      agent_loop_manager_class: uni_agent.trainer.framework.entry.AgentFrameworkRolloutAdapter

    custom:
      agent_framework:
        framework_class_fqn: examples.swe_agent_blackbox.framework.SWEAgentFramework
        agent_runner_fqn: examples.swe_agent_blackbox.agent_runner.swe_agent_runner
        gateway_count: 1
        completion_timeout_seconds: 600
        max_concurrent_sessions: 2
        agent_runner_kwargs:
          agent_config_path: examples/swe_agent_blackbox/config/agent_config.yaml

  actor:
    use_dynamic_bsz: true
    use_kl_loss: false
    kl_loss_coef: 0.0
    clip_ratio_low: 3e-4
    clip_ratio_high: 4e-4
    loss_agg_mode: token-mean
    fsdp_config:
      param_offload: true
      optimizer_offload: true

data:
  train_files: ???
  val_files: ???
  max_prompt_length: 4096
  max_response_length: 4096
  train_batch_size: 8
  val_batch_size: 8
  return_raw_chat: true
  trust_remote_code: true

algorithm:
  gamma: 1.0
  lam: 1.0
  adv_estimator: grpo
  use_kl_in_reward: false
  kl_ctrl:
    type: fixed
    kl_coef: 0.0

reward:
  custom_reward_function:
    path: examples.swe_agent_blackbox.reward
    name: compute_score

trainer:
  nnodes: 1
  n_gpus_per_node: 8
  total_epochs: 30
  project_name: swe_agent_blackbox
  experiment_name: swe_agent
  logger:
    - console
  device: cuda
  balance_batch: false
  val_before_train: true
  val_only: false
  save_freq: 5
  test_freq: 5
  default_local_dir: checkpoints/swe_agent_blackbox
  resume_mode: disable

ray_kwargs:
  ray_init:
    runtime_env:
      env_vars:
        TRANSFORMERS_ATTN_IMPLEMENTATION: eager
        TRANSFER_QUEUE_ENABLE: null
        NCCL_P2P_DISABLE: "1"
        NCCL_SHM_DISABLE: "1"
